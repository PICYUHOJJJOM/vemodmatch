<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vemodmatch</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* === ГЛАВНЫЙ ЭКРАН === */
    #screen-browse {
      padding: 20px;
    }

    .header {
      text-align: center;
      padding: 30px 0 20px;
      border-bottom: 1px solid #1a1a1a;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 22px;
      letter-spacing: 4px;
      color: #fff;
      text-transform: uppercase;
    }

    .header p {
      font-size: 11px;
      color: #444;
      letter-spacing: 2px;
      margin-top: 6px;
    }

    /* === КАРТОЧКА АНКЕТЫ === */
    .card {
      background: #0f0f0f;
      border: 1px solid #1c1c1c;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
      position: relative;
    }

    .card-photo {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      filter: grayscale(20%);
    }

    .card-photo-placeholder {
      width: 100%;
      height: 320px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      color: #1a1a1a;
    }

    .card-gradient {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(transparent, rgba(0,0,0,0.95));
    }

    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
    }

    .card-name {
      font-size: 20px;
      color: #fff;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .card-age-city {
      font-size: 12px;
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .card-music {
      font-size: 11px;
      color: #555;
      letter-spacing: 1px;
      border-top: 1px solid #1a1a1a;
      padding-top: 10px;
      margin-bottom: 8px;
    }

    .card-about {
      font-size: 13px;
      color: #aaa;
      font-style: italic;
      line-height: 1.5;
    }

    /* === КНОПКИ ДЕЙСТВИЙ === */
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      margin-bottom: 30px;
    }

    .btn-pass {
      flex: 1;
      padding: 14px;
      background: transparent;
      border: 1px solid #1c1c1c;
      color: #333;
      font-size: 18px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }

    .btn-pass:hover { border-color: #333; color: #666; }

    .btn-like {
      flex: 1;
      padding: 14px;
      background: transparent;
      border: 1px solid #2a1a1a;
      color: #8b0000;
      font-size: 18px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }

    .btn-like:hover { background: #1a0000; border-color: #8b0000; }

    /* === МОЙ ПРОФИЛЬ === */
    #screen-profile {
      padding: 20px;
    }

    .profile-photo-wrap {
      text-align: center;
      margin: 30px 0 20px;
    }

    .profile-photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #222;
      filter: grayscale(20%);
    }

    .profile-photo-placeholder {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #111;
      border: 1px solid #1a1a1a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #222;
    }

    .profile-name {
      text-align: center;
      font-size: 20px;
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .profile-sub {
      text-align: center;
      font-size: 11px;
      color: #444;
      letter-spacing: 1px;
      margin-bottom: 30px;
    }

    .profile-block {
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-radius: 2px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .profile-block-label {
      font-size: 10px;
      color: #333;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .profile-block-value {
      font-size: 14px;
      color: #aaa;
    }

    /* === НАВИГАЦИЯ === */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #080808;
      border-top: 1px solid #141414;
      display: flex;
      z-index: 100;
    }

    .nav-btn {
      flex: 1;
      padding: 14px;
      background: transparent;
      border: none;
      color: #333;
      font-size: 20px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .nav-btn.active { color: #8b0000; }

    /* === ПУСТО === */
    .empty {
      text-align: center;
      padding: 80px 30px;
      color: #2a2a2a;
    }

    .empty-icon { font-size: 50px; margin-bottom: 20px; }
    .empty-text { font-size: 13px; letter-spacing: 1px; line-height: 1.8; }

    .content-wrap { padding-bottom: 70px; }
  </style>
</head>
<body>

<!-- ЭКРАН: АНКЕТЫ -->
<div id="screen-browse" class="screen active">
  <div class="content-wrap">
    <div class="header">
      <h1>Vemodmatch</h1>
      <p>найди своих</p>
    </div>
    <div id="cards-container"></div>
  </div>
</div>

<!-- ЭКРАН: МОЙ ПРОФИЛЬ -->
<div id="screen-profile" class="screen">
  <div class="content-wrap" id="profile-container"></div>
</div>

<!-- НАВИГАЦИЯ -->
<nav class="nav">
  <button class="nav-btn active" onclick="showScreen('browse')" id="nav-browse">💀</button>
  <button class="nav-btn" onclick="showScreen('profile')" id="nav-profile">👤</button>
</nav>

<script>
  const tg = window.Telegram.WebApp
  tg.expand()
  tg.setHeaderColor('#0a0a0a')

  // Тестовые анкеты
  const profiles = [
    {
      name: 'Томас',
      age: 19,
      city: 'Москва',
      music: 'Lifelover, Dsbm, Nattefrost',
      about: 'живу между треками и тишиной между ними',
      photo: null
    },
    {
      name: 'Ева',
      age: 21,
      city: 'Питер',
      music: 'SoundCloud underground, hyperpop, morgue',
      about: 'ищу человека с которым можно молчать',
      photo: null
    },
    {
      name: 'Влад',
      age: 20,
      city: 'Екатеринбург',
      music: 'natoscak, tryavoid, ##femcel',
      about: 'меланхолия как образ жизни',
      photo: null
    }
  ]

  let currentIndex = 0

  function renderCards() {
    const container = document.getElementById('cards-container')

    if (currentIndex >= profiles.length) {
      container.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🖤</div>
          <div class="empty-text">анкеты закончились<br>загляни позже</div>
        </div>
      `
      return
    }

    const p = profiles[currentIndex]
    container.innerHTML = `
      <div class="card">
        ${p.photo
          ? `<img class="card-photo" src="${p.photo}" />`
          : `<div class="card-photo-placeholder">🖤</div>`
        }
        <div class="card-gradient"></div>
        <div class="card-info">
          <div class="card-name">${p.name}</div>
          <div class="card-age-city">${p.age} лет · ${p.city}</div>
          <div class="card-music">🎵 ${p.music}</div>
          <div class="card-about">"${p.about}"</div>
        </div>
      </div>
      <div class="actions">
        <button class="btn-pass" onclick="nextCard()">✕</button>
        <button class="btn-like" onclick="likeCard()">🖤</button>
      </div>
    `
  }

  function nextCard() {
    currentIndex++
    renderCards()
  }

  function likeCard() {
    const p = profiles[currentIndex]
    tg.showAlert(`Ты лайкнул ${p.name} 🖤`)
    currentIndex++
    renderCards()
  }

  function renderProfile() {
    const user = tg.initDataUnsafe?.user
    const container = document.getElementById('profile-container')
    container.innerHTML = `
      <div style="padding: 20px;">
        <div class="profile-photo-wrap">
          <div class="profile-photo-placeholder">💀</div>
        </div>
        <div class="profile-name">${user?.first_name || 'Аноним'}</div>
        <div class="profile-sub">@${user?.username || 'unknown'}</div>
        <div class="profile-block">
          <div class="profile-block-label">Статус</div>
          <div class="profile-block-value">Профиль создан в боте 🖤</div>
        </div>
        <div class="profile-block">
          <div class="profile-block-label">Подсказка</div>
          <div class="profile-block-value">Чтобы изменить анкету — вернись в бот и напиши /start</div>
        </div>
      </div>
    `
  }

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'))

    document.getElementById('screen-' + name).classList.add('active')
    document.getElementById('nav-' + name).classList.add('active')

    if (name === 'profile') renderProfile()
  }

  renderCards()
</script>
</body>
</html>
